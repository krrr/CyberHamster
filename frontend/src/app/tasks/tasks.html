<div class="tasks-container">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
    <h2>Tasks Manager</h2>
    <button nz-button nzType="primary" (click)="showModal()">Create New Task</button>
  </div>

  <nz-table #basicTable [nzData]="tasks()">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Watch Folder</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let task of basicTable.data">
        <td>{{ task.id }}</td>
        <td>{{ task.name }}</td>
        <td>{{ task.watch_folder }}</td>
        <td>
          <nz-tag [nzColor]="task.status === 'active' ? 'green' : 'red'">
            {{ task.status | uppercase }}
          </nz-tag>
        </td>
        <td>
          <button nz-button nzType="link" (click)="openEditor(task.id)">Edit DAG</button>
          <nz-divider nzType="vertical"></nz-divider>
          <button nz-button nzType="link" (click)="showModal(task)">Edit Task</button>
          <nz-divider nzType="vertical"></nz-divider>
          <button nz-button nzType="link" (click)="toggleTaskStatus(task)">
            {{ task.status === 'active' ? 'Pause' : 'Resume' }}
          </button>
          <nz-divider nzType="vertical"></nz-divider>
          <button
            nz-button
            nzType="link"
            nzDanger
            nz-popconfirm
            nzPopconfirmTitle="Are you sure delete this task?"
            (nzOnConfirm)="deleteTask(task.id)"
          >
            Delete
          </button>
        </td>
      </tr>
    </tbody>
  </nz-table>

  <nz-modal
    [nzVisible]="isModalVisible()"
    (nzVisibleChange)="isModalVisible.set($event)"
    [nzTitle]="isEditing() ? 'Edit Task' : 'Create New Task'"
    (nzOnCancel)="handleCancel()"
    (nzOnOk)="handleOk()"
  >
    <ng-container *nzModalContent>
      <form nz-form nzLayout="vertical">
        <nz-form-item>
          <nz-form-label nzRequired>Name</nz-form-label>
          <nz-form-control nzErrorTip="Please input the task name!">
            <input
              nz-input
              [ngModel]="taskForm().name"
              (ngModelChange)="updateForm('name', $event)"
              name="name"
              placeholder="Task Name"
            />
          </nz-form-control>
        </nz-form-item>

        <nz-form-item>
          <nz-form-label nzRequired>Watch Folder (Absolute path)</nz-form-label>
          <nz-form-control nzErrorTip="Please input the watch folder path!">
            <input
              nz-input
              [ngModel]="taskForm().watch_folder"
              (ngModelChange)="updateForm('watch_folder', $event)"
              name="watch_folder"
              placeholder="/path/to/folder"
            />
          </nz-form-control>
        </nz-form-item>
      </form>
    </ng-container>
  </nz-modal>
</div>
